<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Scaler</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --surface: #fffdf8;
      --surface-2: #efe7d8;
      --text: #252018;
      --muted: #716653;
      --line: #ded3bf;
      --accent: #1f6f5b;
      --danger: #a33a2f;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, textarea { font: inherit; }
    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { color: var(--danger); }
    input, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
    main { width: min(1120px, calc(100% - 24px)); margin: 0 auto; padding: 18px 0 28px; }
    header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 34px); letter-spacing: 0; }
    p { color: var(--muted); }
    .actions, .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 14px; align-items: start; }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px;
      box-shadow: 0 12px 28px rgba(37, 32, 24, 0.08);
    }
    .form { display: grid; gap: 10px; }
    .recipes { display: grid; gap: 10px; }
    .recipe {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }
    .recipe.active { border-color: var(--accent); }
    .ingredients { display: grid; gap: 8px; margin-top: 12px; }
    .ingredient {
      display: grid;
      grid-template-columns: 90px 90px 1fr;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .status { min-height: 22px; color: var(--muted); font-size: 13px; }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      header { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .ingredient { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Recipe Scaler</h1>
        <p>Guarda recetas, escala porciones y exporta tu backup local.</p>
      </div>
      <div class="actions">
        <button id="importButton">Import JSON</button>
        <button id="exportButton">Export JSON</button>
        <button class="danger" id="resetButton">Reset</button>
        <input class="hidden" id="importFile" type="file" accept=".json,application/json">
      </div>
    </header>

    <section class="grid">
      <aside class="panel">
        <h2>Nueva receta</h2>
        <form class="form" id="recipeForm">
          <label>Nombre <input id="nameInput" required placeholder="Tarta express"></label>
          <label>Porciones base <input id="servingsInput" type="number" min="1" step="1" value="4"></label>
          <label>Ingredientes <textarea id="ingredientsInput" rows="7" placeholder="200 g harina&#10;2 unidad huevo&#10;500 ml leche"></textarea></label>
          <button class="primary" type="submit">Guardar receta</button>
        </form>
        <p class="status" id="statusLine"></p>
      </aside>

      <section class="panel">
        <div class="toolbar">
          <label style="flex: 1 1 220px;">Buscar <input id="searchInput" placeholder="Filtrar recetas"></label>
          <label style="width: 150px;">Porciones <input id="targetInput" type="number" min="1" step="1" value="6"></label>
        </div>
        <div class="recipes" id="recipes"></div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "recipe-scaler:v1";
    const sampleState = {
      selectedId: "r1",
      recipes: [
        {
          id: "r1",
          name: "Panqueques base",
          servings: 4,
          ingredients: [
            { amount: 250, unit: "g", name: "harina" },
            { amount: 2, unit: "unidad", name: "huevo" },
            { amount: 500, unit: "ml", name: "leche" }
          ]
        }
      ]
    };
    let state = loadState(sampleState);
    const recipesEl = document.querySelector("#recipes");
    const statusLine = document.querySelector("#statusLine");
    const importFile = document.querySelector("#importFile");

    function loadState(fallback) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(fallback);
      } catch {
        return structuredClone(fallback);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function parseIngredients(text) {
      return text.split("\n").map((line) => line.trim()).filter(Boolean).map((line) => {
        const match = line.match(/^([\d.,]+)\s+(\S+)\s+(.+)$/);
        if (!match) return { amount: 1, unit: "item", name: line };
        return {
          amount: Number(match[1].replace(",", ".")) || 0,
          unit: match[2],
          name: match[3]
        };
      });
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("es-AR", { maximumFractionDigits: 2 }).format(value);
    }

    function render() {
      const query = document.querySelector("#searchInput").value.trim().toLowerCase();
      const target = Number(document.querySelector("#targetInput").value) || 1;
      const rows = state.recipes.filter((recipe) => recipe.name.toLowerCase().includes(query));

      recipesEl.innerHTML = rows.map((recipe) => {
        const factor = target / recipe.servings;
        return `
          <article class="recipe ${recipe.id === state.selectedId ? "active" : ""}">
            <h3>${escapeHtml(recipe.name)}</h3>
            <p>Base: ${recipe.servings} porciones. Escalado a ${target}.</p>
            <div class="ingredients">
              ${recipe.ingredients.map((item) => `
                <div class="ingredient">
                  <strong>${formatNumber(item.amount * factor)}</strong>
                  <span>${escapeHtml(item.unit)}</span>
                  <span>${escapeHtml(item.name)}</span>
                </div>
              `).join("")}
            </div>
            <div class="actions" style="margin-top: 12px;">
              <button data-action="select" data-id="${escapeHtml(recipe.id)}">Seleccionar</button>
              <button class="danger" data-action="delete" data-id="${escapeHtml(recipe.id)}">Borrar</button>
            </div>
          </article>
        `;
      }).join("") || "<p>No hay recetas para ese filtro.</p>";
    }

    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelector("#recipeForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const recipe = {
        id: crypto.randomUUID(),
        name: document.querySelector("#nameInput").value.trim(),
        servings: Number(document.querySelector("#servingsInput").value) || 1,
        ingredients: parseIngredients(document.querySelector("#ingredientsInput").value)
      };
      state.recipes.unshift(recipe);
      state.selectedId = recipe.id;
      event.currentTarget.reset();
      document.querySelector("#servingsInput").value = 4;
      saveState();
      render();
      statusLine.textContent = "Receta guardada.";
    });

    recipesEl.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      if (button.dataset.action === "select") state.selectedId = button.dataset.id;
      if (button.dataset.action === "delete") {
        const recipe = state.recipes.find((entry) => entry.id === button.dataset.id);
        if (!recipe || !confirm(`Borrar "${recipe.name}"?`)) return;
        state.recipes = state.recipes.filter((entry) => entry.id !== recipe.id);
      }
      saveState();
      render();
    });

    document.querySelector("#searchInput").addEventListener("input", render);
    document.querySelector("#targetInput").addEventListener("input", render);
    document.querySelector("#exportButton").addEventListener("click", () => downloadJson("recipes.json", state));
    document.querySelector("#importButton").addEventListener("click", () => importFile.click());
    document.querySelector("#resetButton").addEventListener("click", () => {
      if (!confirm("Restaurar datos de ejemplo?")) return;
      state = structuredClone(sampleState);
      saveState();
      render();
    });
    importFile.addEventListener("change", async () => {
      try {
        const imported = JSON.parse(await importFile.files[0].text());
        if (!Array.isArray(imported.recipes)) throw new Error("Formato invalido.");
        state = imported;
        saveState();
        render();
        statusLine.textContent = "Backup importado.";
      } catch (error) {
        statusLine.textContent = error.message || "No se pudo importar.";
      } finally {
        importFile.value = "";
      }
    });

    render();
  </script>
</body>
</html>
